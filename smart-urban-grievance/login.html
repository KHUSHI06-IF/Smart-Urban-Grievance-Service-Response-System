<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login - SmartGov</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <div class="link">
        New user? <a href="register.html">Create account</a>
    </div>
</head>

<body class="login-page">

    <div class="login-wrapper">

        <!-- Brand -->
        <a href="index.html" class="login-brand">
            <div class="brand-icon">🏛️</div>
            <h2>SMART<span>GOV</span></h2>
        </a>

        <!-- Login Card -->
        <div class="login-box card">

            <h3>Welcome Back</h3>
            <p class="login-subtitle">Access your citizen dashboard securely</p>

            <form>

                <!-- Email -->
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="john@example.com" required>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <div class="password-label">
                        <label>Password</label>
                        <a href="#">Forgot?</a>
                    </div>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <!-- Remember -->
                <div class="form-checkbox">
                    <input type="checkbox" id="remember">
                    <label for="remember">Keep me logged in</label>
                </div>

                <!-- Button -->
                <button type="submit" class="btn btn-primary login-btn">
                    Login to Portal
                </button>

                <!-- Register -->
                <div class="register-link">
                    Don't have an account? <a href="register.html">Register now</a>
                </div>

            </form>

        </div>

        <!-- Footer -->
        <div class="login-footer">
            <p>© 2026 SmartGov Governance Portal</p>
            <p>Secured by 256-bit AES Encryption</p>
        </div>

    </div>

</body>

</html>
