<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login - SmartGov</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

    <div class="login-wrapper">

        <!-- Brand -->
        <a href="index.html" class="login-brand">
            <div class="brand-icon">🏛️</div>
            <h2>Civic<span>Care</span></h2>
        </a>

        <!-- Login Card -->
        <div class="login-box card">

            <h3>Welcome Back</h3>
            <p class="login-subtitle">Access your citizen dashboard securely</p>

            <!-- Added ID -->
            <form id="loginForm">

                <!-- Email -->
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="john@example.com" required>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <div class="password-label">
                        <label>Password</label>
                        <a href="#">Forgot?</a>
                    </div>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>

                <!-- Remember -->

                <!-- Message -->
                <p id="loginMsg" style="color:#00e5ff; font-size:14px;"></p>

                <!-- Button -->
                <button type="submit" class="btn btn-primary login-btn">
                    Login to Portal
                </button>

                <!-- Register -->
                <div class="register-link">
                    Don't have an account? <a href="register.html">Register now</a>
                </div>

            </form>

        </div>

        <!-- Footer -->
        <div class="login-footer">
            <p>© 2026 SmartGov Governance Portal</p>
            <p>Secured by 256-bit AES Encryption</p>
        </div>

    </div>

    <!-- Firebase Script -->
    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        import {
            getFirestore,
            collection,
            query,
            where,
            getDocs
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyC02P5v3WFqueR7qpwxA3cxEKVsUqQpycs",
            authDomain: "smart-grievance-project.firebaseapp.com",
            projectId: "smart-grievance-project",
            storageBucket: "smart-grievance-project.appspot.com",
            messagingSenderId: "351881017713",
            appId: "1:351881017713:web:e0deca315c159579481ed0",
            measurementId: "G-3M2YY17X7P"
        };

        // Init Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Login Handler
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;
            const message = document.getElementById("loginMsg");

            try {
                // 1️⃣ SIGN IN USER
                await signInWithEmailAndPassword(auth, email, password);

                // 2️⃣ CHECK IF USER IS ADMIN
                const q = query(
                    collection(db, "admin"),
                    where("email", "==", email)
                );

                const snap = await getDocs(q);

                if (!snap.empty) {
                    message.innerText = "👑 Admin Login Successful!";
                    setTimeout(() => {
                        window.location.href = "admin.html";  // ADMIN PANEL
                    }, 1200);
                } else {
                    message.innerText = "✅ Login successful! Redirecting...";
                    setTimeout(() => {
                        window.location.href = "dashboard.html"; // CITIZEN DASHBOARD
                    }, 1200);
                }

            } catch (error) {
                message.innerText = "❌ " + error.message;
            }
        });

    </script>

</body>

</html>
