<!DOCTYPE html>
<html>

<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js"></script>
</head>

<body class="bg-slate-900 text-white p-10">

    <div class="max-w-xl mx-auto bg-slate-800 p-8 rounded-2xl shadow-2xl">

        <h2 class="text-2xl font-bold mb-6">📝 Register Complaint</h2>

        <textarea id="complaintText" class="w-full p-3 rounded-lg bg-slate-700 mb-4"
            placeholder="Describe your issue..."></textarea>

        <input type="text" id="location" class="w-full p-3 rounded-lg bg-slate-700 mb-4" placeholder="Enter location">

        <button onclick="submitComplaint()" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-lg">
            Submit Complaint
        </button>

        <div id="aiResult" class="mt-6"></div>

    </div>

    <script>
        function submitComplaint() {

            let text = document.getElementById("complaintText").value;
            let result = antiGravityAgent(text);

            document.getElementById("aiResult").innerHTML = `
        <div class="bg-slate-700 p-4 rounded-lg mt-4">
            <p><b>Category:</b> ${result.category}</p>
            <p><b>Priority:</b> ${result.priority}</p>
            <p><b>Department:</b> ${result.department}</p>
            <p><b>Resolution:</b> ${result.predictedResolution}</p>
            <p><b>AI Severity Score:</b> ${result.aiScore}</p>
        </div>
    `;
        }
    </script>

</body>

</html>
