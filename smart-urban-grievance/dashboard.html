<!DOCTYPE html>
<html>

<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-slate-900 text-white p-10">

    <h2 class="text-3xl font-bold mb-8">📊 City Analytics Dashboard</h2>

    <canvas id="chart"></canvas>

    <script>

        let ctx = document.getElementById('chart');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Electricity', 'Water', 'Road', 'Sanitation'],
                datasets: [{
                    label: 'Complaints',
                    data: [12, 19, 7, 14],
                }]
            }
        });

    </script>

</body>

</html>
