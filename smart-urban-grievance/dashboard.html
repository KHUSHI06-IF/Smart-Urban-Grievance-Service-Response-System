<!DOCTYPE html>
<html lang="en">

<head>
    <title>Citizen Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js" defer></script>
</head>

<body class="bg-gray-100 flex">

    <!-- Sidebar -->
    <div class="w-64 h-screen bg-slate-900 text-white p-6 space-y-6">

        <h1 class="text-2xl font-bold">UrbanCare</h1>

        <button onclick="showSection('home')" class="block w-full text-left">🏠 Dashboard</button>
        <button onclick="showSection('new')" class="block w-full text-left">➕ New Complaint</button>
        <button onclick="showSection('list')" class="block w-full text-left">📋 My Complaints</button>
        <button onclick="showSection('track')" class="block w-full text-left">📍 Track Complaint</button>
        <button onclick="logout()" class="block text-red-400">Logout</button>

    </div>

    <!-- Main -->
    <div class="flex-1 p-8">

        <!-- HOME -->
        <div id="home">
            <h2 class="text-2xl font-bold mb-6">Welcome 👋</h2>

            <div class="grid grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded shadow">
                    <p>Total Complaints</p>
                    <h1 id="totalCount" class="text-3xl font-bold text-blue-600">0</h1>
                </div>
            </div>
        </div>


        <!-- NEW COMPLAINT -->
        <div id="new" class="hidden">
            <h2 class="text-xl font-bold mb-4">File a Complaint</h2>

            <div class="bg-white p-6 rounded shadow space-y-4">

                <input id="title" placeholder="Complaint Title" class="border p-2 w-full rounded">

                <textarea id="desc" placeholder="Complaint Description" class="border p-2 w-full rounded"></textarea>

                <select id="category" class="border p-2 w-full rounded">
                    <option>Road</option>
                    <option>Water</option>
                    <option>Garbage</option>
                    <option>Electricity</option>
                </select>

                <button onclick="addComplaint()" class="bg-blue-600 text-white px-6 py-2 rounded w-full">
                    Submit Complaint
                </button>

            </div>
        </div>


        <!-- LIST -->
        <div id="list" class="hidden">
            <h2 class="text-xl font-bold mb-4">My Complaints</h2>
            <div id="complaintList" class="space-y-3"></div>
        </div>


        <!-- TRACK -->
        <div id="track" class="hidden">
            <h2 class="text-xl font-bold mb-4">Track Complaint</h2>

            <div class="bg-white p-6 rounded shadow space-y-4">

                <input id="trackID" placeholder="Enter Complaint ID" class="border p-2 w-full rounded">

                <button onclick="trackComplaint()" class="bg-green-600 text-white px-6 py-2 rounded w-full">
                    Track
                </button>

            </div>

            <div id="timeline" class="flex gap-8 mt-6"></div>
        </div>

    </div>

</body>

</html>
