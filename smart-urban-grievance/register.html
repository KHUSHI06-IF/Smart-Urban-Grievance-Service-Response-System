<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register - SmartGov</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page register-page">

    <div class="login-wrapper">

        <!-- Brand -->
        <a href="index.html" class="login-brand">
            <div class="brand-icon">🏛️</div>
            <h2>SMART<span>GOV</span></h2>
        </a>

        <!-- Register Card -->
        <div class="login-box card register-box">

            <div class="shield-circle">
                <span class="shield-icon">🛡️</span>
            </div>
            <h3 class="register-heading">Create Citizen Account</h3>
            <p class="login-subtitle">Join the platform to access city services faster</p>

            <form onsubmit="handleRegister(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="regFirstName" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="regLastName" placeholder="Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="tel" id="regPhone" placeholder="+91 98765 43210" required>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="regPass" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="regPassConf" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="terms-box">
                    By clicking "Register Account", you agree to our <a href="#">Terms of Service</a> and <a
                        href="#">Privacy Policy</a> regarding your urban data usage.
                </div>

                <p id="regMsg" style="color: #00e5ff; font-size: 14px; margin-bottom: 10px;"></p>

                <button type="submit" class="btn btn-primary login-btn">
                    Register Account
                </button>

                <div class="register-link">
                    Already registered? <a href="login.html">Sign in instead</a>
                </div>
            </form>
        </div>

        <div class="login-footer">
            <p>© 2026 SmartGov Governance Portal</p>
        </div>

    </div>

    <script>
        function handleRegister(e) {
            e.preventDefault();
            let email = document.getElementById("regEmail").value;
            let pass = document.getElementById("regPass").value;
            let passConf = document.getElementById("regPassConf").value;

            if (pass !== passConf) {
                document.getElementById("regMsg").innerText = "⚠️ Passwords do not match!";
                return;
            }

            let storedUsers = JSON.parse(localStorage.getItem("users") || "[]");

            if (storedUsers.find(u => u.username === email)) {
                document.getElementById("regMsg").innerText = "⚠️ Account already exists!";
                return;
            }

            storedUsers.push({ username: email, password: pass });
            localStorage.setItem("users", JSON.stringify(storedUsers));
            document.getElementById("regMsg").innerText = "✅ Registration successful! Redirecting...";

            setTimeout(() => { window.location.href = "login.html"; }, 1500);
        }
    </script>

</body>

</html>
