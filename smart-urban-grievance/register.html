<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register - SmartGov</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page register-page">

    <div class="login-wrapper">

        <!-- Brand -->
        <a href="index.html" class="login-brand">
            <div class="brand-icon">🏛️</div>
            <h2>SMART<span>GOV</span></h2>
        </a>

        <!-- Register Card -->
        <div class="login-box card register-box">

            <div class="shield-circle">
                <span class="shield-icon">🛡️</span>
            </div>
            <h3 class="register-heading">Create Citizen Account</h3>
            <p class="login-subtitle">Join the platform to access city services faster</p>

            <!-- IMPORTANT: Removed onsubmit -->
            <form id="registerForm">

                <div class="form-grid">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="regFirstName" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="regLastName" placeholder="Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="tel" id="regPhone" placeholder="+91 98765 43210" required>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="regPass" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="regPassConf" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="terms-box">
                    By clicking "Register Account", you agree to our
                    <a href="#">Terms of Service</a> and
                    <a href="#">Privacy Policy</a>.
                </div>

                <p id="regMsg" style="color: #00e5ff; font-size: 14px; margin-bottom: 10px;"></p>

                <button type="submit" class="btn btn-primary login-btn">
                    Register Account
                </button>

                <div class="register-link">
                    Already registered? <a href="login.html">Sign in instead</a>
                </div>
            </form>
        </div>

        <div class="login-footer">
            <p>© 2026 SmartGov Governance Portal</p>
        </div>

    </div>

    <!-- Firebase Module Script -->
    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyC02P5v3WFqueR7qpwxA3cxEKVsUqQpycs",
            authDomain: "smart-grievance-project.firebaseapp.com",
            projectId: "smart-grievance-project",
            storageBucket: "smart-grievance-project.appspot.com",
            messagingSenderId: "351881017713",
            appId: "1:351881017713:web:e0deca315c159579481ed0",
            measurementId: "G-3M2YY17X7P"
        };

        // Init Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Registration Handler
        document.getElementById("registerForm").addEventListener("submit", function (e) {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("regPass").value;
            const confirmPassword = document.getElementById("regPassConf").value;
            const message = document.getElementById("regMsg");

            const firstName = document.getElementById("regFirstName").value;
            const lastName = document.getElementById("regLastName").value;
            const phone = document.getElementById("regPhone").value;

            if (password !== confirmPassword) {
                message.innerText = "⚠️ Passwords do not match!";
                return;
            }

            createUserWithEmailAndPassword(auth, email, password)
                .then(async (userCredential) => {
                    const user = userCredential.user;

                    // Save additional data to Firestore
                    await setDoc(doc(db, "users", user.uid), {
                        firstName: firstName,
                        lastName: lastName,
                        name: firstName + " " + lastName,
                        phone: phone,
                        email: email
                    });

                    message.innerText = "✅ Registration successful! Redirecting...";

                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 1500);
                })
                .catch((error) => {
                    message.innerText = "❌ " + error.message;
                });
        });

    </script>

</body>

</html>
