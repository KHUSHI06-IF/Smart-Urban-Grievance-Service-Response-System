<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Smart Urban AI | Track Complaint</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen">

    <div class="bg-slate-800/60 backdrop-blur-lg p-10 rounded-2xl shadow-2xl w-96 text-center">

        <h1 class="text-3xl font-bold mb-6">Track Complaint</h1>

        <input type="text" id="complaintId" placeholder="Enter Complaint ID"
            class="w-full p-3 mb-4 rounded-lg bg-slate-700 focus:outline-none">

        <button onclick="trackComplaint()" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-lg mb-4 transition">
            Track
        </button>

        <div id="statusBox" class="text-lg mt-4"></div>

    </div>

    <script>
        function trackComplaint() {
            let id = document.getElementById("complaintId").value;
            let complaints = JSON.parse(localStorage.getItem("complaints") || "[]");

            let found = complaints.find(c => c.id === id);

            if (found) {
                document.getElementById("statusBox").innerHTML =
                    "📌 Status: <span class='text-green-400 font-bold'>" + found.status + "</span>";
            } else {
                document.getElementById("statusBox").innerHTML =
                    "<span class='text-red-400'>❌ Complaint Not Found!</span>";
            }
        }
    </script>

</body>

</html>
